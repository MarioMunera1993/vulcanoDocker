version: "3.9"

services:
  # Frontend (React + Vite + Nginx)
  frontend:
    build:
      context: ../vulcano-app-v2
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - app
    networks:
      - vulcano-network

  # Backend (Spring Boot)
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/cursosvulcano
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      UPLOAD_DIR: uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - vulcano-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cursosvulcano
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulcano-network

volumes:
  postgres-data:
    driver: local

networks:
  vulcano-network:
    driver: bridge

