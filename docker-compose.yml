version: "3.9"

services:
  # Frontend (React + Vite + Nginx) - Puerto 3000
  frontend:
    build:
      context: ./vulcano-app-v2
      dockerfile: Dockerfile
    container_name: vulcano-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - vulcano-network

  # Backend (Spring Boot) - Puerto 8080
  backend:
    build:
      context: ./cursos-vulcano-grupo-1
      dockerfile: Dockerfile
    container_name: vulcano-backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/cursosvulcano
      DB_USERNAME: postgres
      DB_PASSWORD: postgres_secure_change_me
      UPLOAD_DIR: uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cursos-vulcano-grupo-1/uploads:/app/uploads
    networks:
      - vulcano-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vulcano-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_change_me
      POSTGRES_DB: cursosvulcano
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulcano-network
    expose:
      - 5432

volumes:
  postgres-data:
    driver: local

networks:
  vulcano-network:
    driver: bridge
